  <style>
    #preloader {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.loader span {
  width: 10px;
  height: 10px;
  margin: 0 5px;
  background: white;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 0.6s infinite alternate;
}

.loader span:nth-child(2){animation-delay:0.2s;}
.loader span:nth-child(3){animation-delay:0.4s;}

@keyframes bounce {
  from {transform:translateY(0); opacity:0.5;}
  to {transform:translateY(-15px); opacity:1;}
}
    body {
      background: #0d0d0d;
      color: white;
      overflow-x: hidden;
      height: 200vh;
    }

    /* OVERLAY */
    .page-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5));
      z-index: 5;
      pointer-events: none;
    }

    /* NAVBAR */
    .navbar {
      background: transparent;
      position: relative;
      z-index: 10;
    }

    .navbar-brand {
      font-size: 28px;
      font-weight: 400;
      font-family: 'Noto Nastaliq Urdu', serif;
      color: white !important;
    }

    .nav-link {
  position: relative;
  color: #ccc !important;
  margin-right: 20px;
  padding: 0;              /* IMPORTANT: remove extra spacing */
  display: inline-block;   /* IMPORTANT: fit to text width */
  transition: 0.3s ease;
}

/* underline base */
.nav-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;   /* 👈 closer to text (fix gap) */
  width: 0%;
  height: 2px;
  background: white;
  transition: width 0.35s ease;
}

/* hover */
.nav-link:hover {
  color: white !important;
}

.nav-link:hover::after {
  width: 100%;
}

    .nav-container {
      display: flex;
      width: 100%;
      align-items: center;
      justify-content: space-between;
    }

    .nav-left, .nav-right {
      display: flex;
      align-items: center;
    }

    /* HERO */
    .hero {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 1200px;
      z-index: 1;
    }

    .card-3d {
      width: 400px;
      height: 500px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.1s linear;
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
    }

    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 20px;
    }

    .back {
      transform: rotateY(180deg);
    }

    /* PRODUCTS */
    .products {
      margin-top: 120vh;
      padding: 80px 0;
      position: relative;
      z-index: 10;
    }

   .product-card {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 15px;
  padding: 15px;
  text-align: center;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  perspective: 1200px;
}
/* 3D wrapper */
.card-flip {
  width: 100%;
  height: 200px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s ease;
  transform: rotateY(0deg);
}
/* images */
.card-flip img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  position: absolute;
  top: 0;
  left: 0;
  backface-visibility: hidden;
}


/* back image */
.card-flip .back-img {
  transform: rotateY(180deg);
}

/* hover state */
.card-flip.active {
  transform: rotateY(180deg);
}

    /* .product-card:hover {
      transform: translateY(-15px);

    /* 🔥 3D IMAGE HOVER EFFECT */
    .product-card img {

      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 10px;
      transition: transform 1s ease;

 .btn-cart {
  background: linear-gradient(135deg, #919191, #f5f5f5);
  color: #111;
  border: none;
  padding: 10px 20px;
  border-radius: 50px;
  cursor: pointer;
  font-size: 13px;
  letter-spacing: 1px;
  font-weight: 500;

  position: relative;
  overflow: hidden;

  transform: scale(1);
  transition: all 0.4s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

/* shine effect layer */
.btn-cart::before {
  content: "";
  position: absolute;
  top: 0;
  left: -120%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255, 255, 255, 0.7),
    transparent
  );
  transition: 0.9s;
}

/* hover premium effect */
.btn-cart:hover {
  transform: translateY(-4px) scale(1.08);
  box-shadow: 0 15px 35px rgba(201, 201, 201, 0.15);
  background: #adadad;
}

/* shine move on hover */
.btn-cart:hover::before {
  left: 120%;
}

/* click effect */
.btn-cart:active {
  transform: scale(0.96);
}

.action-row{
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-top: 10px;
}

/* HEART STYLE */
.heart {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  transition: 0.3s ease;
  position: relative;
}

/* icon */
.heart span {
  font-size: 20px;
  color: white;
  transition: 0.3s ease;
}

/* hover effect */
.heart:hover {
  transform: scale(1.1);
  background: rgba(255,255,255,0.1);
}

/* ACTIVE (filled state) */
.heart.active span {
  color: red;
  transform: scale(1.2);
}

/* POP ANIMATION */
.heart.pop {
  animation: pop 0.3s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.4); }
  100% { transform: scale(1); }
}

/* HERO TEXT OVERLAY */
.hero-text {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  text-align: center;
  transition: opacity 0.6s ease, transform 0.6s ease;
  pointer-events: none;
}

.hero-text h1 {

.hero-text p {

  /* -webkit-text-stroke: 1px white; */

.hero-text.hide {

}

.footer-links a::after{

.footer-links a:hover{

/* BOTTOM */

  </style>

<script>
 $(window).on('scroll', function() {
  let scroll = $(window).scrollTop();
  let maxScroll = $(document).height() - $(window).height();
  let rotate = (scroll / maxScroll) * 180;

  $('#card').css('transform', 'rotateY(' + rotate + 'deg)');

  // HERO TEXT SMOOTH FADE
  if (scroll > 80) {
    $('#heroText').addClass('hide');
  } else {
    $('#heroText').removeClass('hide');
  }
});

 $('.card-flip').on('mouseenter', function () {
  $(this).addClass('active');
});

$('.card-flip').on('mouseleave', function () {
  $(this).removeClass('active');
});

$(window).on('load', function () {
  setTimeout(function () {
    $('#preloader').fadeOut(500);
  }, 2000);
});

function toggleHeart(el){
  el.classList.toggle("active");

  // pop animation
  el.classList.add("pop");

  setTimeout(() => {
    el.classList.remove("pop");
  }, 300);
}
</script>
